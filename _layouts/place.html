---
layout: base
---
<div class="place-hero">
  <img
    src="{{ page.images.hero }}"
    alt="{{ page.images.alt }}"
    width="1600"
    height="1200">
  <a href="/" class="place-back" aria-label="Back to catalog">BACK</a>
</div>

<main class="place-body">
  <h1 class="place-name">{{ page.name }}</h1>
  <p class="place-desc">{{ page.description }}</p>

  <div class="player">
    <audio id="place-audio" src="{{ page.audio }}" preload="none" loop></audio>
    <button id="play-btn" class="player-play" aria-label="Play">
      <span class="player-play__label">PLAY</span>
      <svg class="player-play__icon" width="16" height="18" viewBox="0 0 16 18" aria-hidden="true" focusable="false">
        <polygon points="0,0 16,9 0,18" fill="currentColor"/>
      </svg>
    </button>
    <div class="player-volume">
      <label for="volume-slider" class="player-volume__label">Volume</label>
      <input id="volume-slider" type="range" min="0" max="1" step="0.05" value="0.8" aria-label="Volume">
    </div>
  </div>

  {% if page.location %}
  <div class="place-map">
    <div class="sec-head">
      <span class="sec-head__t">Location</span>
      <div class="sec-head__rule"></div>
    </div>
    <div class="map-frame">
      <iframe
        src="https://www.openstreetmap.org/export/embed.html?bbox={{ page.location.lng | minus: 8 }},{{ page.location.lat | minus: 6 }},{{ page.location.lng | plus: 8 }},{{ page.location.lat | plus: 6 }}&layer=mapnik&marker={{ page.location.lat }},{{ page.location.lng }}"
        title="{{ page.location.label }} map"
        loading="lazy"
        allowfullscreen></iframe>
    </div>
  </div>
  {% endif %}

  <p class="place-creator">
    Recorded by
    {% if page.source %}<a href="{{ page.source }}">{{ page.creator.name }}</a>{% else %}{{ page.creator.name }}{% endif %}
  </p>
</main>

<script src="/assets/js/player.js"></script>
